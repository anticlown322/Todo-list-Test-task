<div class="checkbox-wrapper">
  <input
    type="checkbox"
    [checked]="checked()"
    [disabled]="disabled()"
    [id]="id()"
    (change)="boxChange.emit($any($event.target).checked)"
  />
  <label [for]="id()">
    <svg viewBox="0,0,50,50">
      <path d="M5 30 L 20 45 L 45 5" />
    </svg>
  </label>
</div>
